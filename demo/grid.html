<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strategy Grid Demo — NeoMatrix AI</title>
    <meta name="description" content="A sample strategy grid. Illustrative data only — this mirrors the live strategy grid layout." />
    <link rel="icon" href="../favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="demo_data.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #181b1f; color: #d8d9da; }
        .topbar {
            height: 48px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; background: #111317; border-bottom: 1px solid #2a2d33;
            font-size: 14px; font-weight: 600;
        }
        .topbar .left { display: flex; align-items: center; }
        .topbar .count { margin-left: 8px; color: #8e94a1; font-weight: 400; }
        .topbar a { color: #6ea8ff; text-decoration: none; font-size: 13px; }
        .topbar a:hover { text-decoration: underline; }
        .topbar .links { display: flex; gap: 16px; }

        .demo-banner { background: linear-gradient(90deg, #2a1f3d, #1f2d3d);
            border-bottom: 1px solid #3a3d55; color: #c9b8ff;
            font-size: 12.5px; text-align: center; padding: 6px 16px; }
        .demo-banner strong { color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .cell {
            background: #111317; border: 1px solid #2a2d33; border-radius: 6px;
            display: flex; flex-direction: column; overflow: hidden;
            height: calc((100vh - 114px) / 2);  /* topbar(48) + banner(30) + padding(24) + gap(12) → 2 rows */
        }
        .cell .hdr {
            height: 36px; flex: 0 0 36px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; background: #1a1d22; border-bottom: 1px solid #2a2d33; font-size: 13px;
        }
        .cell .hdr .left { display: flex; align-items: center; min-width: 0; }
        .cell .hdr .label { font-weight: 600; color: #e8e9ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cell .hdr .env { margin-left: 8px; padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; background: #2a2d33; color: #8e94a1; }
        .cell .hdr .env.live { background: #1f3a2a; color: #73d391; }
        .cell .hdr .env.demo { background: #3a2f1f; color: #e0b36a; }
        .cell .hdr a { color: #6ea8ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
        .cell .hdr a:hover { text-decoration: underline; }
        .cell .body { flex: 1 1 auto; position: relative; padding: 6px 10px 10px; }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="left">
            <span>Live Strategy Grid</span>
            <span class="count" id="count"></span>
        </div>
        <div class="links">
            <a href="portfolio.html">&larr; Portfolio</a>
            <a href="https://neomatrix.ai">neomatrix.ai</a>
        </div>
    </div>
    <div class="demo-banner">
        <strong>SAMPLE DATA</strong> &mdash; Illustrative preview of the strategy grid. Each cell shows Portfolio Return vs Benchmark (%). All numbers are synthetic.
    </div>

    <div class="grid" id="grid"></div>

    <script>
    (function () {
        const G = DEMO.grid();
        document.getElementById('count').textContent = `— ${G.strategies.length} active`;
        const grid = document.getElementById('grid');

        G.strategies.forEach((s, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell';

            const hdr = document.createElement('div');
            hdr.className = 'hdr';
            hdr.innerHTML = `
                <div class="left">
                    <span class="label">${s.label}</span>
                    <span class="env ${s.env}">${s.env} · ${s.type}</span>
                </div>
                <a href="strategy.html?s=${encodeURIComponent(s.id)}">Open dashboard &#8599;</a>`;

            const body = document.createElement('div');
            body.className = 'body';
            const canvas = document.createElement('canvas');
            canvas.id = `chart-${idx}`;
            body.appendChild(canvas);

            cell.appendChild(hdr);
            cell.appendChild(body);
            grid.appendChild(cell);

            new Chart(canvas, {
                type: 'line',
                data: {
                    labels: G.dates,
                    datasets: [
                        { label: s.label, data: s.returnPct,
                          borderColor: '#43e97b', backgroundColor: 'rgba(67,233,123,0.08)',
                          fill: true, pointRadius: 0, borderWidth: 1.5, tension: 0.1 },
                        { label: 'BTC (benchmark)', data: G.benchmarkReturn,
                          borderColor: '#3b82f6', backgroundColor: 'transparent',
                          fill: false, pointRadius: 0, borderWidth: 1.5, tension: 0.1 },
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#d8d9da', font: { size: 11 }, boxWidth: 12 } } },
                    scales: {
                        x: { ticks: { color: '#8e94a1', maxTicksLimit: 6 }, grid: { color: '#23262c' } },
                        y: { ticks: { color: '#8e94a1', callback: v => v.toFixed(0) + '%' }, grid: { color: '#23262c' } }
                    }
                }
            });
        });
    })();
    </script>
</body>
</html>
