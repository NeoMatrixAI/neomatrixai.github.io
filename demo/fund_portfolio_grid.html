<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio Grid (Compositor Preview) — NeoMatrix AI</title>
    <meta name="description" content="A sample v3 compositor portfolio grid — every virtual portfolio book at a glance. Illustrative data only." />
    <link rel="icon" href="../favicon.png">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <script src="compositor_data.js"></script>
    <style>
        html, body { margin: 0; padding: 0; height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #181b1f; color: #d8d9da; }
        .topbar {
            height: 48px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; background: #111317; border-bottom: 1px solid #2a2d33;
            font-size: 14px; font-weight: 600;
        }
        .topbar .left { display: flex; align-items: center; }
        .topbar .count { margin-left: 8px; color: #8e94a1; font-weight: 400; }
        .topbar a { color: #6ea8ff; text-decoration: none; font-size: 13px; }
        .topbar a:hover { text-decoration: underline; }
        .topbar .links { display: flex; gap: 16px; }

        .demo-banner { background: linear-gradient(90deg, #2a1f3d, #1f2d3d);
            border-bottom: 1px solid #3a3d55; color: #c9b8ff;
            font-size: 12.5px; text-align: center; padding: 6px 16px; }
        .demo-banner strong { color: #fff; }

        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; padding: 12px; }
        .cell {
            background: #111317; border: 1px solid #2a2d33; border-radius: 6px;
            display: flex; flex-direction: column; overflow: hidden;
            height: calc((100vh - 114px) / 2);
        }
        .cell .hdr {
            height: 36px; flex: 0 0 36px; display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; background: #1a1d22; border-bottom: 1px solid #2a2d33; font-size: 13px;
        }
        .cell .hdr .left { display: flex; align-items: center; min-width: 0; gap: 8px; }
        .cell .hdr .label { font-weight: 600; color: #e8e9ea; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cell .hdr .alloc { padding: 1px 6px; border-radius: 3px; font-size: 11px; font-weight: 500; background: #22304a; color: #9fb4d8; }
        .cell .hdr .badge { padding: 1px 6px; border-radius: 3px; font-size: 10px; font-weight: 700; background: #22304a; color: #9fb4d8; border: 1px solid #3a4a6b; }
        .cell .hdr a { color: #6ea8ff; text-decoration: none; font-size: 12px; white-space: nowrap; }
        .cell .hdr a:hover { text-decoration: underline; }
        .cell .body { flex: 1 1 auto; position: relative; padding: 6px 10px 10px; }
        @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="topbar">
        <div class="left">
            <span>Portfolio Grid — Compositor Preview</span>
            <span class="count" id="count"></span>
        </div>
        <div class="links">
            <a href="fund.html">&larr; Fund</a>
            <a href="fund_alpha_grid.html">Alpha Grid &rarr;</a>
            <a href="https://neomatrix.ai">neomatrix.ai</a>
        </div>
    </div>
    <div class="demo-banner">
        <strong>SAMPLE DATA</strong> &mdash; Every portfolio's <strong>virtual book</strong> at a glance (dashed line = allocated capital). All numbers are synthetic.
    </div>

    <div class="grid" id="grid"></div>

    <script>
    (function () {
        const F = COMP.fund();
        document.getElementById('count').textContent = `— ${F.portfolios.length} virtual portfolios · ${F.fundLabel}`;
        const grid = document.getElementById('grid');
        const fmt = v => v.toLocaleString('en-US', { maximumFractionDigits: 0 });
        const PF_COLORS = { 'pf-core': '#667eea', 'pf-carry': '#43e97b', 'pf-tail': '#f59e0b' };

        F.portfolios.forEach((p, idx) => {
            const cell = document.createElement('div');
            cell.className = 'cell';

            const hdr = document.createElement('div');
            hdr.className = 'hdr';
            hdr.innerHTML = `
                <div class="left">
                    <span class="label">${p.label}</span>
                    <span class="alloc">${(p.allocNow * 100).toFixed(0)}% of fund · since ${p.since}</span>
                    <span class="badge">VIRTUAL</span>
                </div>
                <a href="fund_portfolio.html?p=${encodeURIComponent(p.id)}">Open portfolio &#8599;</a>`;

            const body = document.createElement('div');
            body.className = 'body';
            const canvas = document.createElement('canvas');
            canvas.id = `chart-${idx}`;
            body.appendChild(canvas);

            cell.appendChild(hdr);
            cell.appendChild(body);
            grid.appendChild(cell);

            // The cell's time axis starts at the portfolio's own launch day.
            const startIdx = F.dates.indexOf(p.since);
            new Chart(canvas, {
                type: 'line',
                data: {
                    labels: F.dates.slice(startIdx),
                    datasets: [
                        { label: 'Virtual PV (USDT)', data: p.pv.slice(startIdx),
                          borderColor: PF_COLORS[p.id] || '#667eea',
                          backgroundColor: (PF_COLORS[p.id] || '#667eea') + '14',
                          fill: true, pointRadius: 0, borderWidth: 1.8, tension: 0.05 },
                        { label: 'Allocated capital', data: p.cap.slice(startIdx),
                          borderColor: '#8e94a1', borderDash: [6, 4],
                          fill: false, pointRadius: 0, borderWidth: 1.2, tension: 0 },
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#d8d9da', font: { size: 11 }, boxWidth: 12 } } },
                    scales: {
                        x: { ticks: { color: '#8e94a1', maxTicksLimit: 6 }, grid: { color: '#23262c' } },
                        y: { ticks: { color: '#8e94a1', callback: v => '$' + fmt(v) }, grid: { color: '#23262c' } }
                    }
                }
            });
        });
    })();
    </script>
</body>
</html>
